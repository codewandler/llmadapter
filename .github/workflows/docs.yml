name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare docs artifact
        run: |
          mkdir -p _docs
          cp -R docs/. _docs/
          rm -rf _docs/internal _docs/research
          cp docs/README.md _docs/index.md
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/jekyll-build-pages@v1
        with:
          source: _docs
          destination: _site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
